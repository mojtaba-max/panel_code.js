<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carouser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="viewport">
        <div id="box">
            <img class="pic" src="img/01.png" alt="slide 1">
            <img class="pic" src="img/02.png" alt="slide 2">
            <img class="pic" src="img/03.png" alt="slide 3">
            <img class="pic" src="img/04.png" alt="slide 4">
            <img class="pic" src="img/06.png" alt="slide 5">
        </div>
    </div>

    <div id="boxing">
        <button type="button" onclick="set_timer()" id="btm" class="bt" aria-label="Pause">
            <svg class="icon icon-pause" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <rect x="5" y="4" width="5" height="16" rx="2.5"/>
                <rect x="14" y="4" width="5" height="16" rx="2.5"/>
            </svg>
            <svg class="icon icon-play" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path d="M7.2 5.2v13.6c0 1.2 1.3 1.9 2.3 1.2l10.2-6.8c.9-.6.9-2 0-2.6L9.5 4c-1-.7-2.3 0-2.3 1.2z"/>
            </svg>
        </button>
        <div id="box-dot"></div>
    </div>
</div>

<script src="code.js"></script>
</body>
</html>
